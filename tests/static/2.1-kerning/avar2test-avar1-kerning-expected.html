<!DOCTYPE html>
<html class="reftest-wait">
<meta charset="utf-8">
<style>
  @font-face {
    font-family: avar2test_avar1;
    src: url(../../../fonts/test-font/variable/TestFontAvar1[opsz\,wdth\,wght].ttf);
  }

  body {
    font-family: avar2test_avar1, sans-serif;
    font-size: 200px;
  }

  .thin-expanded {
    font-variation-settings: "wght" 100, "wdth" 125;
  }

  .black-condensed {
    font-variation-settings: "wght" 900, "wdth" 75;
  }
</style>
<!-- The avar2test_avar1 font distorts the designspace, which also affects kerning.
     LT kerning is 0 at default, positive at expanded weights, and negative at condensed weights.
-->
LT <span class="thin-expanded">LT</span> <span class="black-condensed">LT</span>
<script>
  document.fonts.ready.then(
    () => { document.documentElement.classList.remove("reftest-wait"); });
</script>
