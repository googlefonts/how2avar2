<!DOCTYPE html>
<html class="reftest-wait">
<meta charset="utf-8">
<style>
  @font-face {
    font-family: avar2test_variable;
    src: url(../../../fonts/test-font/variable/TestFont[opsz\,wdth\,wght].ttf);
  }

  body {
    font-family: avar2test_variable, sans-serif;
    font-size: 200px;
    font-variation-settings: "opsz" 144;
  }

  .thin-expanded {
    font-variation-settings: "wght" 100, "wdth" 125, "opsz" 144;
  }

  .black-condensed {
    font-variation-settings: "wght" 900, "wdth" 75, "opsz" 144;
  }
</style>
<!-- The avar2test_variable font does not implement opsz,
     and will mismatch values that are not "opsz" 16
-->
H <span class="thin-expanded">H</span> <span class="black-condensed">H</span>
<script>
  document.fonts.ready.then(
    () => { document.documentElement.classList.remove("reftest-wait"); });
</script>
