<!DOCTYPE html>
<html class="reftest-wait">
<meta charset="utf-8">
<style>
  @font-face {
    font-family: avar2test_avar1;
    src: url(../../../fonts/test-font/variable/TestFontAvar1[opsz\,wdth\,wght].ttf);
  }

  body {
    font-family: avar2test_avar1, sans-serif;
    font-size: 200px;
  }

  .thin-expanded {
    font-variation-settings: "wght" 100, "wdth" 125;
  }

  .black-condensed {
    font-variation-settings: "wght" 900, "wdth" 75;
  }
</style>
<!-- The avar2test_avar1 font designspace makes
     the thin weights less thin,
     the black weights less black,
     the condensed weights less condensed, and
     the expanded weights less expanded,
     via the avar1 table axis mappings.
     The font-variation-settings values match the axis mappings.
-->
H <span class="thin-expanded">H</span> <span class="black-condensed">H</span>
<script>
  document.fonts.ready.then(
    () => { document.documentElement.classList.remove("reftest-wait"); });
</script>
