<!DOCTYPE html>
<html class="reftest-wait">
<meta charset="utf-8">
<style>
  @font-face {
    font-family: avar2test_static_text_regular;
    src: url(../../../fonts/test-font/TestFontOpticalSizeRegularText.ttf);
  }

  @font-face {
    font-family: avar2test_static_text_thin_expanded;
    src: url(../../../fonts/test-font/TestFontOpticalSizeThinExpandedText.ttf);
  }

  @font-face {
    font-family: avar2test_static_text_black_condensed;
    src: url(../../../fonts/test-font/TestFontOpticalSizeBlackCondensedText.ttf);
  }

  body {
    font-family: avar2test_static_text_regular, sans-serif;
    font-size: 200px;
  }

  .thin-expanded {
    font-family: avar2test_static_text_thin_expanded, sans-serif;
  }

  .black-condensed {
    font-family: avar2test_static_text_black_condensed, sans-serif;
  }
</style>
<!-- Static text fonts instanced at opsz 16 -->
H <span class="thin-expanded">H</span> <span class="black-condensed">H</span>
<script>
  document.fonts.ready.then(
    () => { document.documentElement.classList.remove("reftest-wait"); });
</script>
